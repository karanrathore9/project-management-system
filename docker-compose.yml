services:
  backend:
    build: .
    container_name: pm-backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: pm-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
   

volumes:
  mongo_data: